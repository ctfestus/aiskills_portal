<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You are offline</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #ffffff; color: #111827; text-align: center; padding: 24px;
      }
      .card { max-width: 340px; }
      img { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 20px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 15px; line-height: 1.5; color: #6b7280; margin: 0 0 20px; }
      a.retry {
        display: inline-block; border-radius: 10px; padding: 12px 20px; font-size: 15px;
        font-weight: 600; color: #fff; background: #2563eb; text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-192.png" alt="" />
      <h1>You are offline</h1>
      <p>Check your connection and try again. Content you already opened may still be available.</p>
      <a class="retry" href="/">Retry</a>
    </div>
  </body>
</html>
